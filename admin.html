<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAPPY Program - Admin Dashboard</title>
  <style>
    :root {
      --royal-blue: #4F46E5;
      --indigo-purple: #7C3AED;
      --gradient: linear-gradient(135deg, var(--royal-blue), var(--indigo-purple));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F3F4F6;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 30px;
    }
    .header {
      background: var(--gradient);
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--gradient);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .filters {
      margin-bottom: 20px;
      padding: 15px;
      background: #F9FAFB;
      border-radius: 8px;
    }
    .filters input {
      padding: 10px 14px;
      border: 2px solid #E5E7EB;
      border-radius: 6px;
      font-size: 1rem;
      width: 300px;
      max-width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #E5E7EB;
    }
    th {
      background: var(--gradient);
      color: white;
      font-weight: 600;
    }
    tr:hover {
      background: #F9FAFB;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6B7280;
    }
    .error {
      background: #FEE2E2;
      color: #991B1B;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .refresh-btn {
      background: var(--gradient);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      table { font-size: 0.85rem; }
      th, td { padding: 8px; }
      .filters input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 HAPPY Program - Admin Dashboard</h1>
      <p>View and manage consent form submissions</p>
    </div>
    
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalSubmissions">-</div>
        <div class="stat-label">Total Submissions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="todaySubmissions">-</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="weekSubmissions">-</div>
        <div class="stat-label">This Week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="monthSubmissions">-</div>
        <div class="stat-label">This Month</div>
      </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
    
    <div class="filters">
      <input type="text" id="searchInput" placeholder="🔍 Search by name, phone, or submission ID..." oninput="filterTable()">
    </div>
    
    <div id="content">
      <div class="loading">Loading data...</div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzjN1_lV0_aq9rEoROhJ275QPc1a6o7htxVhc8r4PyY0aXmJ-VNPxbiMi2WRLpo8zfeXA/exec';
    let allData = [];

    async function loadData() {
      try {
        // Load stats
        const statsRes = await fetch(`${SCRIPT_URL}?action=getStats`);
        const statsData = await statsRes.json();
        
        if (statsData.status === 'success') {
          document.getElementById('totalSubmissions').textContent = statsData.stats.total;
          document.getElementById('todaySubmissions').textContent = statsData.stats.today;
          document.getElementById('weekSubmissions').textContent = statsData.stats.thisWeek;
          document.getElementById('monthSubmissions').textContent = statsData.stats.thisMonth;
        }
        
        // Load submissions
        const res = await fetch(`${SCRIPT_URL}?action=getSubmissions`);
        const data = await res.json();
        
        if (data.status === 'success') {
          allData = data.data;
          renderTable(allData);
        } else {
          throw new Error(data.message);
        }
      } catch (err) {
        document.getElementById('content').innerHTML = `
          <div class="error">❌ Error loading data: ${err.message}</div>
        `;
      }
    }

    function renderTable(data) {
      if (data.length === 0) {
        document.getElementById('content').innerHTML = '<p style="text-align:center;padding:40px;color:#6B7280;">No submissions yet</p>';
        return;
      }
      
      const html = `
        <table>
          <thead>
            <tr>
              <th>Submission ID</th>
              <th>Timestamp</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Consent</th>
              <th>Language</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(row => `
              <tr>
                <td><strong>${row['Submission ID'] || 'N/A'}</strong></td>
                <td>${new Date(row['Timestamp']).toLocaleString()}</td>
                <td>${row['Full Name']}</td>
                <td>${row['Phone']}</td>
                <td>${row['Email'] || '-'}</td>
                <td>${row['Consent Given']}</td>
                <td>${row['Language'] || 'English'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      document.getElementById('content').innerHTML = html;
    }

    function filterTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allData.filter(row => {
        return (
          (row['Full Name'] && row['Full Name'].toLowerCase().includes(search)) ||
          (row['Phone'] && row['Phone'].toLowerCase().includes(search)) ||
          (row['Submission ID'] && row['Submission ID'].toLowerCase().includes(search))
        );
      });
      renderTable(filtered);
    }

    // Load on page load
    loadData();
    
    // Auto-refresh every 60 seconds
    setInterval(loadData, 60000);
  </script>
</body>
</html>
