<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAPPY Admin Dashboard</title>
  <style>
    :root{--g:linear-gradient(135deg,#4F46E5,#7C3AED)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#F3F4F6;padding:20px}
    .wrap{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
    .head{background:var(--g);color:#fff;padding:16px;border-radius:8px;margin-bottom:20px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
    .stat{background:var(--g);color:#fff;padding:14px;border-radius:8px;text-align:center}
    .stat b{font-size:1.8rem}
    .filters{margin-bottom:16px}
    .filters input{padding:10px;border:2px solid #E5E7EB;border-radius:6px;width:100%;max-width:400px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #E5E7EB}
    th{background:var(--g);color:#fff;position:sticky;top:0}
    tr:hover{background:#F9FAFB}
    .loading{text-align:center;padding:40px;color:#6B7280}
    .error{background:#FEE2E2;color:#991B1B;padding:14px;border-radius:8px;margin-bottom:16px}
    .refresh{background:var(--g);color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;margin-bottom:16px}
    @media(max-width:768px){table{font-size:.85rem}th,td{padding:8px}.stats{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head"><h1>📊 HAPPY Admin</h1><p>Consent submissions dashboard</p></div>
    <div class="stats" id="stats"></div>
    <button class="refresh" onclick="load()">🔄 Refresh</button>
    <div class="filters"><input type="text" id="q" placeholder="🔍 Search name, phone, or ID..." oninput="filter()"></div>
    <div id="out"></div>
  </div>
  <script>
    const API='https://script.google.com/macros/s/1yV1Y3YtsFFIZSYgV1pYh4YbVzXVhCVn8Fq7A6T_8j1_Gb5kTj6a8I5Fw/exec';
    let data=[];
    async function load(){
      try{
        const s=await fetch(API+'?action=getStats').then(r=>r.json());
        if(s.status==='success'){
          document.getElementById('stats').innerHTML=`
            <div class="stat"><b>${s.stats.total}</b><div>Total</div></div>
            <div class="stat"><b>${s.stats.today}</b><div>Today</div></div>
            <div class="stat"><b>${s.stats.week}</b><div>Week</div></div>
            <div class="stat"><b>${s.stats.month}</b><div>Month</div></div>`;
        }
        const r=await fetch(API+'?action=getSubmissions').then(r=>r.json());
        if(r.status==='success'){data=r.data;render(data);}
      }catch(e){document.getElementById('out').innerHTML=`<p class="error">❌ ${e.message}</p>`;}
    }
    function render(rows){
      if(!rows.length){document.getElementById('out').innerHTML='<p class="loading">No submissions yet</p>';return;}
      document.getElementById('out').innerHTML=`<table><thead><tr><th>ID</th><th>Time</th><th>Name</th><th>Phone</th><th>Email</th><th>Consent</th></tr></thead><tbody>
        ${rows.map(r=>`<tr><td><b>${r['Submission ID']}</b></td><td>${new Date(r['Timestamp']).toLocaleString()}</td><td>${r['Full Name']}</td><td>${r['Phone']}</td><td>${r['Email']||'-'}</td><td>${r['Consent']}</td></tr>`).join('')}
      </tbody></table>`;
    }
    function filter(){
      const q=document.getElementById('q').value.toLowerCase();
      render(data.filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(q))));
    }
    load();
    setInterval(load,60000);
  </script>
</body>
</html>
